name: Test RDS and S3 Integration (Read Only)

on:
  #push:
  #  branches: [ main ]
  workflow_dispatch:

jobs:
  test-rds-s3:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MySQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client
          mysql --version

      - name: Test RDS Connection
        run: |
          mysql \
            -h "${{ secrets.RDS_HOST }}" \
            -u "${{ secrets.RDS_USERNAME }}" \
            -p"${{ secrets.RDS_PASSWORD }}" \
            -e "SHOW DATABASES;" \
            "${{ secrets.RDS_DB_NAME }}"
        shell: bash

      - name: Install or Update AWS CLI
        run: |
          # 기존 설치 제거 (선택사항)
          sudo rm -rf /usr/local/aws-cli
          
          # 최신 AWS CLI 설치
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip -q awscliv2.zip
          sudo ./aws/install --bin-dir /usr/local/bin --install-dir /usr/local/aws-cli --update
          aws --version
          rm -rf awscliv2.zip aws

      - name: Configure AWS CLI
        run: |
          aws configure set aws_access_key_id "${{ secrets.AWS_ACCESS_KEY_ID }}"
          aws configure set aws_secret_access_key "${{ secrets.AWS_SECRET_ACCESS_KEY }}"
          aws configure set default.region ap-northeast-2

      - name: Debug S3 Access
        run: |
          echo "Testing bucket: ${{ secrets.S3_BUCKET }}"
          aws sts get-caller-identity || echo "⛔ AWS 인증 실패"
          aws s3api get-bucket-location --bucket "${{ secrets.S3_BUCKET }}" --debug 2>&1 || echo "⛔ 버킷 리전 조회 실패"
          aws s3 ls "s3://${{ secrets.S3_BUCKET }}" --region ap-northeast-2 --debug 2>&1 || echo "⛔ 버킷 접근 실패"
          aws s3api get-public-access-block --bucket "${{ secrets.S3_BUCKET }}" 2>&1 || echo "⚠ 퍼블릭 액세스 설정 확인 필요"
        shell: bash
