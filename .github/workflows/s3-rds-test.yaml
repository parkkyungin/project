name: Test RDS and S3 Integration (Read Only)

on:
  #push:
  #  branches: [ main ]
  workflow_dispatch:

env:
  NEXTCLOUD_VERSION: "latest"
  DB_HOST: "${{ secrets.RDS_HOST }}"
  DB_NAME: "${{ secrets.RDS_DB_NAME }}"
  DB_USER: "${{ secrets.RDS_USERNAME }}"
  DB_PASSWORD: "${{ secrets.RDS_PASSWORD }}"
  S3_BUCKET: "${{ secrets.S3_BUCKET }}"
  S3_KEY: "${{ secrets.AWS_ACCESS_KEY_ID }}"
  S3_SECRET: "${{ secrets.AWS_SECRET_ACCESS_KEY }}"
  S3_REGION: "ap-northeast-2"  # 한국 리전
  S3_HOSTNAME: "s3.ap-northeast-2.amazonaws.com"  # 한국 리전 호스트명

jobs:
  test-integrations:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Start Nextcloud with RDS and S3
        run: |
          # Nextcloud 설치 및 구성
          docker run -d --name nextcloud-test \
            -e NEXTCLOUD_ADMIN_USER=admin \
            -e NEXTCLOUD_ADMIN_PASSWORD=admin \
            -e MYSQL_HOST=$DB_HOST \
            -e MYSQL_DATABASE=$DB_NAME \
            -e MYSQL_USER=$DB_USER \
            -e MYSQL_PASSWORD=$DB_PASSWORD \
            -p 8080:80 \
            nextcloud:$NEXTCLOUD_VERSION

          # Nextcloud가 시작될 때까지 대기
          docker exec nextcloud-test bash -c 'while ! curl -s http://localhost:80 >/dev/null; do sleep 1; done'

          # S3 연결 설정 (조회 전용으로 autocreate 비활성화)
          docker exec nextcloud-test bash -c 'php occ config:system:set objectstore \
            --value="{\"class\":\"OC\\\\Files\\\\ObjectStore\\\\S3\",\"arguments\":{\"bucket\":\"$S3_BUCKET\",\"autocreate\":false,\"key\":\"$S3_KEY\",\"secret\":\"$S3_SECRET\",\"hostname\":\"$S3_HOSTNAME\",\"port\":443,\"use_ssl\":true,\"region\":\"$S3_REGION\",\"use_path_style\":false}}"'

      - name: Verify RDS connection
        run: |
          # RDS 연결 확인 (테이블 목록 조회)
          echo "Testing RDS connection..."
          docker exec nextcloud-test bash -c 'php occ db:list-tables' | grep 'oc_' && echo "RDS connection successful!"

      - name: Verify S3 connection (Read Only)
        run: |
          # S3 연결 확인 (버킷 목록 조회만 시도)
          echo "Testing S3 connection (read-only)..."
          docker exec nextcloud-test bash -c 'php occ files:list admin --output=json' && echo "S3 connection check successful!"

      - name: Cleanup
        if: always()
        run: |
          docker stop nextcloud-test || true
          docker rm nextcloud-test || true
