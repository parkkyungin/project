name: Test RDS and S3 Integration (Read Only)

on:
  #push:
  #  branches: [ main ]
  workflow_dispatch:

jobs:
  test-rds-s3:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test RDS Connection
        run: |
          # MySQL/MariaDB 연결 테스트 (RDS)
          sudo apt-get install -y mysql-client
          mysql \
            -h "${{ secrets.RDS_HOST }}" \
            -u "${{ secrets.RDS_USERNAME }}" \
            -p"${{ secrets.RDS_PASSWORD }}" \
            -e "SHOW DATABASES;" \
            "${{ secrets.RDS_DB_NAME }}"
        shell: bash

      - name: Test S3 Connection (Read Only)
        run: |
          # AWS CLI 설치
          sudo apt-get install -y awscli

          # S3 버킷 목록 조회 (Read Only)
          AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
          AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
          AWS_DEFAULT_REGION="ap-northeast-2" \
          aws s3 ls "s3://${{ secrets.S3_BUCKET }}/" --region ap-northeast-2
        shell: bash
