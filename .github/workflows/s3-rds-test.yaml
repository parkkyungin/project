name: Test RDS and S3 Integration (Read Only)

on:
  #push:
  #  branches: [ main ]
  workflow_dispatch:

jobs:
  test-rds-s3:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test RDS Connection
        run: |
          # MySQL/MariaDB 클라이언트 설치
          sudo apt-get update
          sudo apt-get install -y mysql-client
          
          # RDS 연결 테스트
          mysql \
            -h "${{ secrets.RDS_HOST }}" \
            -u "${{ secrets.RDS_USERNAME }}" \
            -p"${{ secrets.RDS_PASSWORD }}" \
            -e "SHOW DATABASES;" \
            "${{ secrets.RDS_DB_NAME }}"
        shell: bash

      - name: Install AWS CLI v2
        run: |
          # 공식 AWS 설치 스크립트 사용
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip awscliv2.zip
          sudo ./aws/install
          aws --version

      - name: Test S3 Connection (Read Only)
        run: |
          # S3 버킷 목록 조회
          AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
          AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
          aws s3 ls "s3://${{ secrets.S3_BUCKET }}/" --region ap-northeast-2
        shell: bash
